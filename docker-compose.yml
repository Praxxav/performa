version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: proforma_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - proforma_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: proforma_server
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/proforma
      # Add other environment variables here like JWT_SECRET, CLOUDINARY_URL, etc.
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - proforma_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proforma_frontend
    ports:
      - "3003:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - proforma_network

networks:
  proforma_network:
    driver: bridge

volumes:
  mongodb_data:
